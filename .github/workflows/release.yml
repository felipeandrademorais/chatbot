name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      rollback_to_sha:
        description: 'Optional image SHA for rollback (without prefix)'
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Build, push, deploy staging, validate
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.rollback_to_sha == '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to staging
        run: ./scripts/deploy-staging.sh "${{ github.ref_name }}"

      - name: Staging smoke tests
        run: ./scripts/smoke-staging.sh

      - name: Critical e2e tests
        run: ./scripts/e2e-critical.sh

  production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: release
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Deploy to production
        run: ./scripts/deploy-production.sh "${{ github.ref_name }}"

      - name: Post-deploy smoke
        run: ./scripts/smoke-production.sh

  rollback:
    name: Manual rollback
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.rollback_to_sha != '' }}
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Roll back production
        run: ./scripts/rollback-production.sh "sha-${{ github.event.inputs.rollback_to_sha }}"
