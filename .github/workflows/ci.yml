name: CI

on:
  pull_request:
    branches: ['main', 'develop']
  push:
    branches: ['main', 'develop']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  validate:
    name: Validate (lint, format, types)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate formatting
        run: pnpm run --if-present format:check

      - name: Lint
        run: pnpm run --if-present lint

      - name: Typecheck
        run: pnpm run --if-present typecheck

  unit:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm run --if-present test:unit -- --coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: |
            coverage/**
            **/coverage/**
          if-no-files-found: ignore

  integration:
    name: Integration tests (docker-compose)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and start stack
        run: docker compose -f docker-compose.yml up -d --build

      - name: Wait for health
        run: |
          for i in {1..30}; do
            if docker compose ps; then
              sleep 5
            fi
          done

      - name: Run integration tests
        run: pnpm run --if-present test:integration

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Teardown stack
        if: always()
        run: docker compose down -v

  contract:
    name: Contract checks (OpenAPI + JSON Schema)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate contracts
        run: pnpm run --if-present test:contract

      - name: Check API compatibility
        run: pnpm run --if-present contract:compat

  security:
    name: Security (secrets, deps, image scan)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependency audit
        run: pnpm audit --audit-level high

      - name: Build image for scanning
        run: docker build -t chatbot:ci .

      - name: Container scan (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: chatbot:ci
          format: table
          exit-code: '1'
          vuln-type: os,library
          severity: CRITICAL,HIGH

  quality:
    name: Sonar quality gate
    runs-on: ubuntu-latest
    needs: [unit, contract, security]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: SonarSource/sonarqube-quality-gate-action@d304d050d930b02a896b0f85935344f023928496 # v1.1.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Generate Sonar Failure Report
        if: failure()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PROJECT_KEY: felipeandrademorais_chatbot
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          echo "Fetching Quality Gate details from SonarCloud API..."
          response=$(curl -s -u "$SONAR_TOKEN": "https://sonarcloud.io/api/qualitygates/project_status?projectKey=$PROJECT_KEY&branch=$BRANCH")

          echo "## SonarCloud Quality Gate Failure Details" > sonar-report.md
          echo "The following metrics failed the quality gate:" >> sonar-report.md
          echo "$response" | jq -r '.projectStatus.conditions[] | select(.status=="ERROR") | "- **\(.metricKey)**: Actual value \(.actualValue) (Threshold: \(.errorThreshold))"' >> sonar-report.md

          echo "Report generated:"
          cat sonar-report.md

      - name: Upload Sonar Report Artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-failure-report
          path: sonar-report.md

  build:
    name: Build immutable docker image
    runs-on: ubuntu-latest
    needs: [integration, contract, security]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=sha-${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Build image
        run: docker build -t chatbot:${IMAGE_TAG} .

      - name: Save image artifact
        run: docker save chatbot:${IMAGE_TAG} | gzip > chatbot-image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ github.sha }}
          path: chatbot-image.tar.gz

  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ github.sha }}

      - name: Load image
        run: gunzip -c chatbot-image.tar.gz | docker load

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run smoke tests
        run: pnpm run --if-present test:smoke
