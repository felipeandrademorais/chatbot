name: CI

on:
  pull_request:
    branches: ['main', 'develop']
  push:
    branches: ['main', 'develop']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  validate:
    name: Validate (lint, format, types)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PNPM
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Minimum quality gates (static)
        run: pnpm run quality:gate
        env:
          QUALITY_GATE_SKIP_STAGE_TESTS: '1'
          QUALITY_GATE_SKIP_CONTRACT: '1'
          QUALITY_GATE_SKIP_SECURITY: '1'
          QUALITY_GATE_SKIP_BREAKING: '1'
          QUALITY_GATE_SKIP_CONTRACT_FREEZE: '1'
          QUALITY_GATE_SKIP_SMOKE: '1'

  unit:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PNPM
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Stage tests (unit) + coverage
        run: pnpm run --if-present test:unit -- --coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-unit
          path: |
            coverage/**
            **/coverage/**
          if-no-files-found: ignore

  integration:
    name: Integration tests (docker-compose)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PNPM
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Prepare environment
        run: |
          cp .env.example .env
          sed -i 's/^POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=ci-test-password/' .env

      - name: Build and start stack (test profile)
        run: docker compose --profile test up -d --build --wait

      - name: Verify migrations completed
        run: docker compose logs migrate

      - name: Build contracts for tests
        run: pnpm --filter @chatbot/contracts run build

      - name: Run integration tests
        env:
          GATEWAY_URL: http://localhost:3000
          ORCHESTRATOR_URL: http://localhost:3001
        run: pnpm run test:integration

      - name: Run smoke tests
        env:
          GATEWAY_URL: http://localhost:3000
        run: pnpm run test:smoke

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose --profile test logs --no-color

      - name: Teardown stack
        if: always()
        run: docker compose --profile test down -v

  contract:
    name: Contract checks (OpenAPI + JSON Schema)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PNPM
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: OpenAPI lint
        run: pnpm run openapi:lint

      - name: Contract-first import boundaries
        run: bash scripts/check-contract-first.sh

      - name: Lint core contracts (no explicit any)
        run: pnpm exec eslint packages/contracts/src --max-warnings 0

      - name: Contract tests (start.md §6)
        run: pnpm run --if-present test:contract

      - name: Contract compatibility (breaking changes)
        run: pnpm run --if-present contract:compat

      - name: Upload OpenAPI artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: openapi-contracts
          path: packages/contracts/openapi/*.openapi.json
          if-no-files-found: error

  security:
    name: Security (secrets, deps, image scan)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PNPM
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SAST scan (Semgrep)
        uses: returntocorp/semgrep-action@f9d7322f22365f03701757b9cb77c69ce5de2f6d # v1
        with:
          config: >-
            p/security-audit
            p/secrets

      - name: Dependency audit
        run: pnpm audit --audit-level high

      - name: Build image for scanning
        run: docker build -t chatbot:ci .

      - name: Container scan (Trivy)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: chatbot:ci
          format: table
          exit-code: '1'
          vuln-type: os,library
          severity: CRITICAL,HIGH

  dast:
    name: DAST smoke (authz critical path)
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PNPM
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Prepare environment
        run: |
          cp .env.example .env
          sed -i 's/^POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=ci-test-password/' .env
          sed -i 's/^JWT_SECRET=.*/JWT_SECRET=stage08-ci-signing-secret-at-least-32-chars/' .env

      - name: Start stack for DAST smoke
        run: docker compose --profile test up -d --build --wait

      - name: Build contracts for tests
        run: pnpm --filter @chatbot/contracts run build

      - name: Run DAST authz smoke tests
        env:
          GATEWAY_URL: http://localhost:3000
          JWT_SECRET: stage08-ci-signing-secret-at-least-32-chars
        run: pnpm run test:security

      - name: Teardown stack
        if: always()
        run: docker compose --profile test down -v

  quality:
    name: Sonar quality gate
    runs-on: ubuntu-latest
    needs: [unit, contract, security]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: SonarSource/sonarqube-quality-gate-action@d304d050d930b02a896b0f85935344f023928496 # v1.1.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Generate Sonar Failure Report
        if: failure()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PROJECT_KEY: felipeandrademorais_chatbot
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          echo "Fetching Quality Gate details from SonarCloud API..."
          response=$(curl -s -u "$SONAR_TOKEN": "https://sonarcloud.io/api/qualitygates/project_status?projectKey=$PROJECT_KEY&branch=$BRANCH")

          echo "## SonarCloud Quality Gate Failure Details" > sonar-report.md
          echo "The following metrics failed the quality gate:" >> sonar-report.md
          echo "$response" | jq -r '.projectStatus.conditions[] | select(.status=="ERROR") | "- **\(.metricKey)**: Actual value \(.actualValue) (Threshold: \(.errorThreshold))"' >> sonar-report.md

          echo "Report generated:"
          cat sonar-report.md

          echo "Writing to Job Summary..."
          cat sonar-report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Sonar Report Artifact
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sonar-failure-report
          path: sonar-report.md

  build:
    name: Build immutable docker image
    runs-on: ubuntu-latest
    needs: [integration, contract, security, dast]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set image tag
        run: echo "IMAGE_TAG=sha-${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Build image
        run: docker build -t chatbot:${IMAGE_TAG} .

      - name: Save image artifact
        run: docker save chatbot:${IMAGE_TAG} | gzip > chatbot-image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docker-image-${{ github.sha }}
          path: chatbot-image.tar.gz

  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: docker-image-${{ github.sha }}

      - name: Load image
        run: gunzip -c chatbot-image.tar.gz | docker load

      - name: Setup PNPM
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Prepare environment
        run: |
          cp .env.example .env
          sed -i 's/^POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=ci-test-password/' .env

      - name: Start stack for smoke tests
        run: docker compose --profile test up -d --wait

      - name: Build contracts for tests
        run: pnpm --filter @chatbot/contracts run build

      - name: Run smoke tests
        env:
          GATEWAY_URL: http://localhost:3000
        run: pnpm run test:smoke

      - name: Teardown stack
        if: always()
        run: docker compose --profile test down -v
